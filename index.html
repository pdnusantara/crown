    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      /* Hindari flash putih sebelum React mount: latar gelap default. */
      html, body { background: #0a0a0a; color: #f5f5f5; }
      /* Landing (`/`) SELALU terang — matikan latar gelap di route landing. */
      html.is-landing, html.is-landing body { background: #FBFAF6; color: #1C1A17; }
      /* Sticky nav offset untuk anchor scroll. */
      html { scroll-behavior: smooth; }
      [id] { scroll-margin-top: 80px; }
    </style>
    <script>
      // Landing tidak punya dark mode — set latar terang sebelum React mount
      // supaya tidak ada kedip gelap. Halaman app lain tetap gelap.
      if (location.pathname === '/') {
        document.documentElement.className += ' is-landing';
        var tc = document.querySelector('meta[name="theme-color"]');
        if (tc) tc.content = '#FBFAF6';
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
